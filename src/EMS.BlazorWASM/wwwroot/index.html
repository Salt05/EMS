<!DOCTYPE html>
<html lang="vi" class="h-full bg-[#F7F9FC]">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="EMS — Hệ thống Quản lý Sự kiện dành cho Admin và Organizer" />
    <title>EMS Dashboard</title>
    <base href="/" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link href="css/app.css" rel="stylesheet" />

    <!-- Tailwind CSS CDN & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
              mono: ['JetBrains Mono', 'SF Mono', 'monospace'],
            },
            colors: {
              canvas: '#F7F9FC',
              surface: '#FFFFFF',
              border: '#E3E8EE',
              charcoal: '#1A1F36',
              muted: '#787774',
              accent: '#0A2540',
              paleRed: { bg: '#FDEBEC', text: '#9F2F2D' },
              paleBlue: { bg: '#E1F3FE', text: '#1F6C9F' },
              paleGreen: { bg: '#EDF3EC', text: '#346538' },
              paleYellow: { bg: '#FBF3DB', text: '#956400' }
            },
            boxShadow: {
              'bento': '0 2px 8px rgba(26, 31, 54, 0.02)',
              'bento-hover': '0 4px 16px rgba(26, 31, 54, 0.04)',
            }
          }
        }
      }
    </script>
    <style>
      /* Premium scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #E3E8EE; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #C1C9D2; }
      
      /* Fallback constraint for SVGs if Tailwind CDN is slow to load */
      svg { max-width: 24px; max-height: 24px; }
      #app > div > svg { max-width: 56px; max-height: 56px; } /* Loading screen exception */
    </style>
</head>

<body class="h-full text-charcoal font-sans antialiased overflow-hidden">
    <div id="app" class="h-full w-full">
        <!-- Loading screen -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#F7F9FC;color:#1A1F36;font-family:Inter,sans-serif;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:1.5rem; color:#1A1F36;">
                <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2" stroke-dasharray="2 2"/>
            </svg>
            <div style="width:32px;height:32px;border:2px solid rgba(26,31,54,0.1);border-top-color:#1A1F36;border-radius:50%;animation:spin .8s linear infinite;"></div>
            <p style="margin-top:1rem;font-size:0.875rem;font-weight:500;color:#787774;letter-spacing:0.02em;">Đang tải hệ thống...</p>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        Đã xảy ra lỗi không mong muốn.
        <a href="" class="reload">Tải lại</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
